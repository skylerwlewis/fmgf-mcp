name: Build and Publish to npm

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "PACKAGE=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists — bump the version to release."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE="${{ steps.version.outputs.PACKAGE }}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --repo ${{ github.repository }}

          EXISTING=$(gh release view "v${VERSION}" --json body -q .body --repo ${{ github.repository }})

          {
            echo "📦 **npm:** \`npx ${PACKAGE}@${VERSION}\`"
            echo ""
            echo "**MCP config (Claude Desktop / VS Code):**"
            echo '```json'
            echo '{'
            echo '  "mcpServers": {'
            echo '    "findmeglutenfree": {'
            echo '      "command": "npx",'
            printf '      "args": ["-y", "%s"]\n' "${PACKAGE}"
            echo '    }'
            echo '  }'
            echo '}'
            echo '```'
            echo 'With login credentials'
            echo '```json'
            echo '{'
            echo '  "mcpServers": {'
            echo '    "findmeglutenfree": {'
            echo '      "command": "npx",'
            printf '      "args": ["-y", "%s"],\n' "${PACKAGE}"
            echo '      "env": {'
            echo '        "FMGF_USERNAME": "you@example.com",'
            echo '        "FMGF_PASSWORD": "your-password"'
            echo '      }'
            echo '    }'
            echo '  }'
            echo '}'
            echo '```'
            echo ""
            echo "---"
            echo ""
            printf '%s\n' "${EXISTING}"
          } > /tmp/release-notes.md

          gh release edit "v${VERSION}" --notes-file /tmp/release-notes.md --repo ${{ github.repository }}
